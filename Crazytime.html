<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Crazy Time - Manual Stop</title>
<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111, #000);
    color: gold;
    font-family: Arial, sans-serif;
    text-align: center;
}
h1 {
    text-shadow: 0 0 20px gold;
    margin-top: 20px;
}
#wheel-container {
    position: relative;
    margin: 40px auto;
    width: 400px;
    height: 400px;
}
#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 10px solid gold;
    box-shadow: 0 0 30px gold;
    transform: rotate(0deg);
}
#pointer {
    width: 0; 
    height: 0; 
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 40px solid red;
    position: absolute;
    top: -40px;
    left: calc(50% - 20px);
    z-index: 10;
}
button {
    background: gold;
    border: none;
    padding: 10px 25px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    font-weight: bold;
}
button:hover { background: orange; }
input[type="number"] {
    padding: 5px;
    font-size: 16px;
    width: 100px;
    margin: 5px;
    border-radius: 5px;
    border: 2px solid gold;
    text-align: center;
    background: #222;
    color: white;
}
.info { font-size: 18px; margin-top: 10px; }
.win { color: lime; font-size: 22px; text-shadow: 0 0 10px lime; }
.lose { color: red; }
</style>
</head>
<body>

<h1>💎 VIP CRAZY TIME 💎</h1>
<div id="wheel-container">
    <div id="pointer"></div>
    <canvas id="wheel" width="400" height="400"></canvas>
</div>

<div>
    💰 Bet: <input type="number" id="betInput" value="50" min="10">
    <button onclick="startSpin()">🎡 SPIN</button>
    <button onclick="stopSpin()">⏹ STOP</button>
</div>

<div class="info">💰 Balance: ₱<span id="balance">1000</span></div>
<div class="info" id="result"></div>

<script>
// JSON Wheel Segments
const segments = [
    {"label": "1x", "color": "#ff0000", "multiplier": 1},
    {"label": "2x", "color": "#ff6600", "multiplier": 2},
    {"label": "5x", "color": "#ffcc00", "multiplier": 5},
    {"label": "10x", "color": "#00ccff", "multiplier": 10},
    {"label": "20x", "color": "#9900ff", "multiplier": 20},
    {"label": "Crazy Coin", "color": "#00ff00", "multiplier": 15},
    {"label": "Jackpot", "color": "#ff00ff", "multiplier": 50}
];

let balance = 1000;
let spinning = false;
let angle = 0;
let speed = 0;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const radius = canvas.width / 2;

function drawWheel() {
    const anglePerSegment = 2 * Math.PI / segments.length;
    for (let i = 0; i < segments.length; i++) {
        // Draw segment
        ctx.beginPath();
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius-10, i*anglePerSegment, (i+1)*anglePerSegment);
        ctx.closePath();
        ctx.fillStyle = segments[i].color;
        ctx.fill();

        // Draw label
        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate((i + 0.5) * anglePerSegment);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "bold 16px Arial";
        ctx.fillText(segments[i].label, radius - 20, 5);
        ctx.restore();
    }
}
drawWheel();

function startSpin() {
    if (spinning) return;

    const bet = parseInt(document.getElementById('betInput').value);
    if (bet < 10 || bet > balance) {
        showResult("⚠️ Invalid bet", "lose");
        return;
    }

    balance -= bet;
    updateUI();
    spinning = true;
    speed = 0.3 + Math.random()*0.3; // random initial speed
    animate();
}

function stopSpin() {
    spinning = false;
}

function animate() {
    if (speed > 0.001 || spinning) {
        angle += speed;
        speed *= spinning ? 1 : 0.97; // deceleration if stopped
        canvas.style.transform = `rotate(${angle}rad)`;
        requestAnimationFrame(animate);
    } else {
        // Wheel stopped, calculate winning segment
        const normalizedAngle = angle % (2*Math.PI);
        const segmentIndex = segments.length - 1 - Math.floor(normalizedAngle / (2*Math.PI) * segments.length);
        const winningSegment = segments[segmentIndex];
        const bet = parseInt(document.getElementById('betInput').value);
        const winnings = bet * winningSegment.multiplier;
        balance += winnings;
        showResult(`🎉 ${winningSegment.label}! You win ₱${winnings}`, "win");
        updateUI();
        spinning = false;
    }
}

function showResult(text, type) {
    const result = document.getElementById("result");
    result.innerHTML = text;
    result.className = "info " + type;
}

function updateUI() {
    document.getElementById("balance").textContent = balance;
}
</script>

</body>
</html>
